name: checkpost-dev

x-osquery-agent: &osquery-agent
  depends_on:
    checkpost:
      condition: service_started
  command:
    - bash
    - -c
    - |
      until curl --cacert /etc/osquery-tls/server.pem -fsS -o /dev/null https://checkpost:1323/bootstrap/linux.sh; do
        echo "waiting for checkpost..."; sleep 2;
      done
      curl --cacert /etc/osquery-tls/server.pem -fsSL https://checkpost:1323/bootstrap/linux.sh | bash || true
      sed -i 's|^--tls_hostname=.*|--tls_hostname=checkpost:1323|' /etc/osquery/osquery.flags
      echo '--tls_server_certs=/etc/osquery-tls/server.pem' >> /etc/osquery/osquery.flags
      # The installer's restart step may launch a daemon (via init.d on Debian) that
      # holds the pidfile; --force makes our foreground instance kill it and take over.
      exec osqueryd --flagfile=/etc/osquery/osquery.flags --force

services:
  checkpost:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1323:1323"
    environment:
      - CHECKPOST_APP__ROOT_URL=https://localhost:1323
      - CHECKPOST_APP__USE_TLS=true
      - CHECKPOST_APP__HTTP_TLS_CERT=/etc/checkpost/tls/server_cert.pem
      - CHECKPOST_APP__HTTP_TLS_KEY=/etc/checkpost/tls/server_key.pem
      - CHECKPOST_APP__ENROLLMENT_KEY=secret-key
      - CHECKPOST_APP__POLICY_UPDATE_INTERVAL=5s
      # SSO via dex. The canonical issuer/token host (dex:5556) is reachable from
      # the checkpost container; the browser-facing auth host is localhost:5556
      # (dex issuerRotation accepts both).
      - CHECKPOST_APP__OIDC__ISSUER=http://dex:5556/dex
      - CHECKPOST_APP__OIDC__CLIENT_ID=checkpost
      - CHECKPOST_APP__OIDC__CLIENT_SECRET=secret
      - CHECKPOST_APP__OIDC__LABEL=Dex SSO
      - CHECKPOST_APP__OIDC__AUTH_URL=http://localhost:5556/dex/auth
      - CHECKPOST_APP__OIDC__TOKEN_URL=http://dex:5556/dex/token
      - CHECKPOST_APP__OIDC__REDIRECT_URL=https://localhost:1323/auth/callback
      - CHECKPOST_APP__OIDC__DEFAULT_ROLE=viewer
      # Alerting via MailHog (plaintext SMTP; no STARTTLS/auth).
      - CHECKPOST_ALERTS__ENABLED=true
      - CHECKPOST_ALERTS__SMTP__HOST=mailhog
      - CHECKPOST_ALERTS__SMTP__PORT=1025
      - CHECKPOST_ALERTS__SMTP__TLS=none
      - CHECKPOST_ALERTS__SMTP__FROM=checkpost@checkpost.internal
      - CHECKPOST_DB__HOST=postgres
      - CHECKPOST_DB__PORT=5432
      - CHECKPOST_DB__USER=checkpost
      - CHECKPOST_DB__PASSWORD=checkpost
      - CHECKPOST_DB__DBNAME=checkpost
      # osquery agent install packages served by /bootstrap.
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__DEB_AMD64__URL=https://pkg.osquery.io/deb/osquery_5.23.0-1.linux_amd64.deb
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__DEB_AMD64__SHA256=8938e83d71c6e668f24648b4fb612581db30f95cd31bf76a86c3ba4a6680a7dc
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__DEB_ARM64__URL=https://pkg.osquery.io/deb/osquery_5.23.0-1.linux_arm64.deb
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__DEB_ARM64__SHA256=c3442880a2fff324fea26a7bc4b2c6b1bc816e5f22f1016f0141d6381eec12e2
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__RPM_AMD64__URL=https://pkg.osquery.io/rpm/osquery-5.23.0-1.linux.x86_64.rpm
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__RPM_AMD64__SHA256=93797324a340ea83c2a4cb6f0cac20055acb53ba9a3bda44b993791c6e975f1e
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__RPM_ARM64__URL=https://pkg.osquery.io/rpm/osquery-5.23.0-1.linux.aarch64.rpm
      - CHECKPOST_OSQUERY_BOOTSTRAP__LINUX__RPM_ARM64__SHA256=a46318a88aaa74420b46e5e01213d33e0c4122788a02014c2c67dc9ba235d2c1
      - CHECKPOST_OSQUERY_BOOTSTRAP__MACOS__PKG_UNIVERSAL__URL=https://pkg.osquery.io/darwin/osquery-5.23.0.pkg
      - CHECKPOST_OSQUERY_BOOTSTRAP__MACOS__PKG_UNIVERSAL__SHA256=2621179c334a6482fa822732f121409bbccc36784db18f576e2965dfc4f1845d
      - CHECKPOST_OSQUERY_BOOTSTRAP__WINDOWS__MSI_AMD64__URL=https://pkg.osquery.io/windows/osquery-5.23.0.msi
      - CHECKPOST_OSQUERY_BOOTSTRAP__WINDOWS__MSI_AMD64__SHA256=5060c7cc21bc00258b5d7822a769cb619ff432c02ba89f6c1b6cbfa127d59b40
    volumes:
      - "../testdata/server_cert.pem:/etc/checkpost/tls/server_cert.pem:ro,z"
      - "../testdata/server_key.pem:/etc/checkpost/tls/server_key.pem:ro,z"
      - "../data:/app/data:z"
    depends_on:
      postgres:
        condition: service_healthy
      dex:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      default:
        aliases:
          - checkpost

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=checkpost
      - POSTGRES_USER=checkpost
      - POSTGRES_DB=checkpost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkpost"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - type: volume
        source: checkpost-db-data
        target: /var/lib/postgresql

  dex:
    image: dexidp/dex:v2.44.0-alpine
    restart: unless-stopped
    ports:
      - "5556:5556"
    volumes:
      - "./dex-config.yaml:/etc/dex/config.yml:ro,z"
    command: ["dex", "serve", "/etc/dex/config.yml"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:5556/dex/.well-known/openid-configuration",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

  osquery-fedora:
    <<: *osquery-agent
    hostname: checkpost-dev-fedora
    build:
      context: ..
      dockerfile: dev/osquery.fedora.Dockerfile
    volumes:
      - "osquery-fedora-db:/var/osquery"

  osquery-debian:
    <<: *osquery-agent
    hostname: checkpost-dev-debian
    build:
      context: ..
      dockerfile: dev/osquery.debian.Dockerfile
    volumes:
      - "osquery-debian-db:/var/osquery"

volumes:
  checkpost-db-data:
  osquery-fedora-db:
  osquery-debian-db:
