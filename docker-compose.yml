services:
  postgres:
    image: postgres:17.0-alpine3.20
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=watcher
      - POSTGRES_USER=watcher
      - POSTGRES_DB=watcher
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watcher"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - type: volume
        source: watcher-db-data
        target: /var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8.0.1-alpine3.20
    ports:
      - 6379:6379
    volumes:
      - type: volume
        source: valkey-data
        target: /data

  osquery:
    build:
      context: ./testdata
      dockerfile: Dockerfile.osquery
    volumes:
      - "./testdata/server_cert.pem:/etc/osquery-tls/certs/server.pem"
    environment:
      - ENROLLMENT_SECRET=secret-key
    command:
      [
        "osqueryd",
        "--logger_plugin=tls",
        "--enroll_tls_endpoint=/api/v1/osquery/enroll",
        "--config_tls_endpoint=/api/v1/osquery/config",
        "--tls_hostname=host.docker.internal:1323",
        "--tls_server_certs=/etc/osquery-tls/certs/server.pem",
        "--disable_enrollment=false",
        "--enroll_secret_env=ENROLLMENT_SECRET",
      ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  watcher-db-data:
  valkey-data:
