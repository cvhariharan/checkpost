{{ define "error" }}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-6xl font-bold text-primary-800">{{ .ErrorCode }}</h1>
        <p class="mt-4 text-xl text-primary-600">{{ .ErrorMessage }}</p>
        <a href="/" class="mt-8 inline-block px-6 py-3 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-md transition-colors">
            Return Home
        </a>
    </div>
</div>
{{ end }}
