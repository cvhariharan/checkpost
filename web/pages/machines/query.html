{{ define "content" }}
<div x-data="{ 
    machine: null,
    queryText: '',
    queryHistory: [],
    loading: true,
    executing: false,
    init() {
        const machineId = window.location.pathname.split('/')[2];
        Promise.all([
            fetch(`/api/v1/machines/${machineId}`).then(r => r.json()),
            fetch(`/api/v1/machines/${machineId}/queries`).then(r => r.json())
        ]).then(([machineData, historyData]) => {
            this.machine = machineData;
            this.queryHistory = historyData;
            this.loading = false;
        });
    },
    async executeQuery() {
        if (!this.queryText.trim()) return;
        
        this.executing = true;
        const machineId = this.machine.id;
        
        try {
            const response = await fetch(`/api/v1/machines/${machineId}/query`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query: this.queryText })
            });
            
            const result = await response.json();
            this.queryHistory.unshift(result);
            this.queryText = '';
        } catch (error) {
            console.error('Query execution failed:', error);
        } finally {
            this.executing = false;
        }
    }
}">
    <!-- Loading State -->
    <template x-if="loading">
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin h-8 w-8 border-3 border-primary-200 rounded-full border-t-indigo-600"></div>
        </div>
    </template>

    <template x-if="!loading">
        <!-- Machine Info Header -->
        <div class="mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-semibold text-primary-900" x-text="machine.hostname"></h1>
                    <p class="mt-1 text-sm text-primary-500" x-text="machine.os"></p>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="flex items-center px-3 py-1 rounded-full text-sm"
                          :class="machine.online ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
                        <div class="h-2 w-2 rounded-full mr-2"
                             :class="machine.online ? 'bg-green-500' : 'bg-red-500'"></div>
                        <span x-text="machine.online ? 'Online' : 'Offline'"></span>
                    </span>
                </div>
            </div>
        </div>

        <!-- Query Editor -->
        <div class="bg-white shadow-sm rounded-lg border border-primary-200 overflow-hidden mb-6">
            <div class="px-6 py-4 border-b border-primary-200">
                <h2 class="text-lg font-medium text-primary-900">Execute Query</h2>
            </div>
            <div class="p-6">
                <textarea 
                    x-model="queryText"
                    class="w-full h-32 px-3 py-2 text-sm font-mono border border-primary-200 rounded-md focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="SELECT * FROM processes LIMIT 10;"
                ></textarea>
                <div class="mt-4 flex justify-end">
                    <button 
                        @click="executeQuery"
                        :disabled="executing || !queryText.trim()"
                        class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50"
                        :class="{ 'opacity-50 cursor-not-allowed': executing || !queryText.trim() }"
                    >
                        <span x-text="executing ? 'Executing...' : 'Run Query'"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Query History -->
        <div class="bg-white shadow-sm rounded-lg border border-primary-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-primary-200">
                <h2 class="text-lg font-medium text-primary-900">Query History</h2>
            </div>
            <div class="divide-y divide-primary-200">
                <template x-for="(query, index) in queryHistory" :key="index">
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-4">
                            <div class="font-mono text-sm text-primary-600" x-text="query.query"></div>
                            <div class="text-sm text-primary-500" x-text="new Date(query.timestamp).toLocaleString()"></div>
                        </div>
                        <div class="bg-primary-50 rounded-md p-4 overflow-x-auto">
                            <pre class="text-sm text-primary-800" x-text="JSON.stringify(query.results, null, 2)"></pre>
                        </div>
                    </div>
                </template>
                <template x-if="queryHistory.length === 0">
                    <div class="p-6 text-center text-primary-500">
                        No queries executed yet
                    </div>
                </template>
            </div>
        </div>
    </template>
</div>
{{ end }}
