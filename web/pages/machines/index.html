{{ define "machines_index" }}
<div x-data="{ 
    machines: {{ .Machines | toJSON }},
    filteredMachines: {{ .Machines | toJSON }},
    filterMachines(search) {
        if (!search) {
            this.filteredMachines = this.machines;
            return;
        }
        search = search.toLowerCase();
        this.filteredMachines = this.machines.filter(machine => 
            machine.Hostname.toLowerCase().includes(search) ||
            machine.Platform.toLowerCase().includes(search) ||
            machine.Status.toLowerCase().includes(search)
        );
    }
}" @search.window="filterMachines($event.detail)">
    <!-- Page Header -->
    <div class="mb-4">
        <h1 class="text-2xl font-semibold text-primary-900">Connected Machines</h1>
        <p class="mt-1 text-sm text-primary-500">View and manage all connected osquery endpoints</p>
    </div>

    <!-- Search Component -->
    {{ template "search" "Search machines..." }}

    <!-- Machines Table -->
    <div class="bg-white shadow-sm rounded-lg border border-primary-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-primary-200">
                    <thead class="bg-primary-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Status
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Hostname
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Operating System
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Last Seen
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Version
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-primary-200">
                        <template x-for="machine in filteredMachines" :key="machine.ID">
                            <tr class="hover:bg-primary-50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="h-2.5 w-2.5 rounded-full mr-2" :class="machine.Status === 'active' ? 'bg-green-500' : 'bg-red-500'">
                                        </div>
                                        <span class="text-sm text-primary-600" x-text="machine.Status">
                                        </span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm font-medium text-primary-900" x-text="machine.Hostname"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-primary-600" x-text="machine.Platform"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-primary-600" x-text="machine.LastSeen"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-primary-600">4.9.0</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                    <a :href="'/machines/' + machine.ID + '/query'" 
                                       class="text-indigo-600 hover:text-indigo-900">
                                        Query
                                    </a>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

</div>
{{ end }}
