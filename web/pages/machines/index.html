{{ define "machines_index" }}
<div x-data="{ 
    machines: {{ .Machines | toJSON }},
    filteredMachines: {{ .Machines | toJSON }},
    activePopup: null,
    filterMachines(searchData) {
        const search = searchData.term ? searchData.term.toLowerCase() : '';
        const tag = searchData.tag;
        
        this.filteredMachines = this.machines.filter(machine => {
            const matchesSearch = !search || 
                machine.Hostname.toLowerCase().includes(search) ||
                machine.Platform.toLowerCase().includes(search) ||
                machine.Status.toLowerCase().includes(search);
            
            const matchesTag = !tag || 
                (machine.Tags && machine.Tags.includes(tag));
            
            return matchesSearch && matchesTag;
        });
    }
}" @search.window="filterMachines($event.detail)">
    <!-- Page Header -->
    <div class="mb-4">
        <h1 class="text-2xl font-semibold text-primary-900">Connected Machines</h1>
        <p class="mt-1 text-sm text-primary-500">View and manage all connected osquery endpoints</p>
    </div>

    <!-- Search Bar -->
    <div class="mb-4 flex gap-4">
        {{ template "search" "Search machines..." }}
        {{ template "tag_selector" .AllTags }}
    </div>

    <!-- Machines Table -->
    <div class="bg-white shadow-sm rounded-lg border border-primary-200">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-primary-200">
                    <thead class="bg-primary-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Status
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Hostname
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Operating System
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Last Seen
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Tags
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Version
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-primary-500 uppercase tracking-wider">
                                Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-primary-200">
                        <template x-for="machine in filteredMachines" :key="machine.ID">
                            <tr class="hover:bg-primary-50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="h-2.5 w-2.5 rounded-full mr-2" :class="machine.Status === 'active' ? 'bg-green-500' : 'bg-red-500'">
                                        </div>
                                        <span class="text-sm text-primary-600" x-text="machine.Status">
                                        </span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm font-medium text-primary-900" x-text="machine.Hostname"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-primary-600" x-text="machine.Platform"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-primary-600" x-text="machine.LastSeen"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex flex-wrap gap-2 items-center">
                                        <template x-for="tag in (machine.Tags || []).slice(0, 2)" :key="tag">
                                            <span class="px-2 py-1 text-xs font-medium bg-primary-100 text-primary-700 rounded-full" x-text="tag"></span>
                                        </template>
                                        <template x-if="(machine.Tags || []).length > 2">
                                            <div x-data="{ show: false }">
                                                <button 
                                                    class="px-2 py-1 text-xs font-medium bg-primary-100 text-primary-700 rounded-full hover:bg-primary-200"
                                                    @mouseenter="
                                                        show = true;
                                                        $nextTick(() => {
                                                            const rect = $el.getBoundingClientRect();
                                                            $refs[`tooltip-${machine.ID}`].style.left = (rect.left + rect.width/2) + 'px';
                                                            $refs[`tooltip-${machine.ID}`].style.top = (window.scrollY + rect.top - 10) + 'px';
                                                        })"
                                                    @mouseleave="show = false"
                                                    x-text="`+${(machine.Tags || []).length - 2} more`">
                                                </button>
                                                <div
                                                    :ref="`tooltip-${machine.ID}`"
                                                    x-show="show"
                                                    class="fixed z-[60] -mt-24 px-3 py-2 bg-white border border-primary-200 rounded-lg shadow-lg -translate-x-1/2">
                                                    <div class="flex flex-wrap gap-2 overflow-y-auto max-h-20">
                                                        <template x-for="tag in machine.Tags.slice(2)" :key="tag">
                                                            <span class="px-2 py-1 text-xs font-medium bg-primary-100 text-primary-700 rounded-full" x-text="tag"></span>
                                                        </template>
                                                    </div>
                                                    <!-- Arrow -->
                                                    <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-white border-b border-r border-primary-200 transform rotate-45"></div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-primary-600">4.9.0</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                    <a :href="'/machines/' + machine.ID + '/query'" 
                                       class="text-indigo-600 hover:text-indigo-900">
                                        Query
                                    </a>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

</div>
{{ end }}
