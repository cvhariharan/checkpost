{{ define "packs_index" }}
<div x-data="{ 
    packs: {{ .Packs | toJSON }},
    filteredPacks: {{ .Packs | toJSON }},
    filterPacks(search) {
        if (!search) {
            this.filteredPacks = this.packs;
            return;
        }
        search = search.toLowerCase();
        this.filteredPacks = this.packs.filter(pack => 
            pack.Name.toLowerCase().includes(search) ||
            (pack.Description && pack.Description.toLowerCase().includes(search)) ||
            pack.Queries.toString().includes(search) ||
            pack.Targets.toString().includes(search)
        );
    }
}" @search.window="filterPacks($event.detail)">
    <!-- Page Header -->
    <div class="mb-4">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-primary-900">Query Packs</h1>
                <p class="mt-1 text-sm text-primary-500">Manage osquery packs and their queries</p>
            </div>
        </div>
    </div>

    <!-- Search Component -->
    <div class="mb-4">
        {{ template "search" "Search machines..." }}
    </div>

    <!-- Packs Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="pack in filteredPacks" :key="pack.Name">
            <div class="bg-white shadow-sm rounded-lg border border-primary-200 overflow-hidden hover:border-primary-300 transition-colors">
                <div class="px-6 py-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-medium text-primary-900" x-text="pack.Name"></h3>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800">
                            <span x-text="pack.Queries"></span> queries
                        </span>
                    </div>
                    <p class="mt-1 text-sm text-primary-500" x-text="pack.Description || 'No description'"></p>
                    <div class="mt-2">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-primary-100 text-primary-800">
                            <span x-text="pack.Targets"></span> targets
                        </span>
                    </div>
                </div>
            </div>
        </template>
    </div>

</div>
{{ end }}
