{{ define "create_schedule_modal" }}
<div
    x-data="{
    showModal: false,
    queries: [],
    selectedQuery: '',
    title: '',
    interval: 3600,
    platform: 'any',
    snapshot: false, // Add snapshot property
    error: '',
    isSubmitting: false,
    editMode: false,
    scheduleId: null,
    async fetchQueries() {
        try {
            const response = await fetch('/api/v1/queries?page=1&count_per_page=1000');
            if (!response.ok) throw new Error('Failed to fetch queries');
            const data = await response.json();
            this.queries = data.queries || [];
        } catch (error) {
            console.error('Error fetching queries:', error);
            this.error = error.message;
        }
    },
    async saveSchedule() {
        this.isSubmitting = true;
        this.error = '';
        try {
            const payload = {
                query_id: this.selectedQuery,
                title: this.title,
                interval: parseInt(this.interval),
                platform: this.platform,
                snapshot: this.snapshot // Include snapshot in payload
            };

            const url = this.editMode ? `/api/v1/schedule/${this.scheduleId}` : '/api/v1/schedule';
            const method = this.editMode ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.error || 'Failed to create schedule');
            }
            this.showModal = false;
            this.$dispatch('schedules-updated');
        } catch (error) {
            console.error('Error creating schedule:', error);
            this.error = error.message;
        } finally {
            this.isSubmitting = false;
        }
    },
    resetForm() {
        this.selectedQuery = '';
        this.title = '';
        this.interval = 3600;
        this.platform = 'any';
        this.snapshot = false; // Reset snapshot
        this.error = '';
        this.editMode = false;
        this.scheduleId = null;
    },
    handleEdit(schedule) {
        this.editMode = true;
        this.scheduleId = schedule.uuid;
        this.selectedQuery = schedule.query.uuid;
        this.title = schedule.title;
        this.interval = schedule.interval;
        this.platform = schedule.platform || 'any';
        this.snapshot = schedule.snapshot || false; // Set snapshot on edit
        this.showModal = true;
        this.fetchQueries();
    },
    init() {
        this.$watch('showModal', (value) => {
            if (value) {
                this.fetchQueries();
            }
        });
    }
}"
    x-cloak
    @show-create-schedule-modal.window="showModal = true"
    @edit-schedule.window="handleEdit($event.detail)"
>
    <!-- Modal -->
    <div x-show="showModal" class="fixed inset-0 z-50 overflow-y-auto">
        <div
            class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0"
        >
            <!-- Background overlay -->
            <div
                x-show="showModal"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                class="fixed inset-0 transition-opacity"
                @click="showModal = false"
            >
                <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
            </div>

            <!-- Modal panel -->
            <div
                x-show="showModal"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6"
                @click.away="showModal = false"
            >
                <form @submit.prevent="saveSchedule">
                    <div>
                        <h3 class="text-lg leading-6 font-medium text-gray-900">
                            <span x-text="editMode ? 'Edit Schedule' : 'Create New Schedule'"></span>
                        </h3>

                        <!-- Error Message -->
                        <div x-show="error">
                            <div class="rounded-md bg-red-50 p-4 mb-4">
                                <div class="flex">
                                    <div class="flex-shrink-0">
                                        <svg
                                            class="h-5 w-5 text-red-400"
                                            xmlns="http://www.w3.org/2000/svg"
                                            viewBox="0 0 20 20"
                                            fill="currentColor"
                                        >
                                            <path
                                                fill-rule="evenodd"
                                                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                                                clip-rule="evenodd"
                                            />
                                        </svg>
                                    </div>
                                    <div class="ml-3">
                                        <p
                                            x-text="error"
                                            class="text-sm font-medium text-red-800"
                                        ></p>
                                    </div>
                                    <div class="ml-auto pl-3">
                                        <div class="-mx-1.5 -my-1.5">
                                            <button
                                                type="button"
                                                @click="error = ''"
                                                class="inline-flex rounded-md p-1.5 text-red-500 hover:bg-red-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-red-50 focus:ring-red-600"
                                            >
                                                <span class="sr-only"
                                                    >Dismiss</span
                                                >
                                                <svg
                                                    class="h-5 w-5"
                                                    xmlns="http://www.w3.org/2000/svg"
                                                    viewBox="0 0 20 20"
                                                    fill="currentColor"
                                                >
                                                    <path
                                                        fill-rule="evenodd"
                                                        d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                                                        clip-rule="evenodd"
                                                    />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-6 space-y-6">
                            <div>
                                <label
                                    for="query"
                                    class="block text-sm font-medium text-primary-700"
                                    >Select Query
                                    <span class="text-red-500">*</span></label
                                >
                                <div class="mt-1">
                                    <select
                                        x-model="selectedQuery"
                                        class="block w-full pl-4 pr-10 py-2 text-base border border-primary-200 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
                                        required
                                    >
                                        <option value="">
                                            Select a query...
                                        </option>
                                        <template
                                            x-for="query in queries"
                                            :key="query.uuid"
                                        >
                                            <option
                                                :value="query.uuid"
                                                x-text="query.description || query.query"
                                            ></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label
                                    for="title"
                                    class="block text-sm font-medium text-primary-700"
                                    >Title
                                    <span class="text-red-500">*</span></label
                                >
                                <input
                                    type="text"
                                    name="title"
                                    id="title"
                                    x-model="title"
                                    required
                                    placeholder="Schedule title"
                                    class="mt-1 block w-full pl-4 pr-4 py-2 border border-primary-200 rounded-lg text-sm placeholder-primary-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                />
                            </div>
                            <div>
                                <label
                                    for="interval"
                                    class="block text-sm font-medium text-primary-700"
                                    >Interval (seconds)
                                    <span class="text-red-500">*</span></label
                                >
                                <input
                                    type="number"
                                    name="interval"
                                    id="interval"
                                    x-model="interval"
                                    required
                                    min="1"
                                    max="604800"
                                    class="mt-1 block w-full pl-4 pr-4 py-2 border border-primary-200 rounded-lg text-sm placeholder-primary-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                />
                            </div>
                            <div>
                                <label
                                    for="platform"
                                    class="block text-sm font-medium text-primary-700"
                                    >Platform</label
                                >
                                <select
                                    name="platform"
                                    id="platform"
                                    x-model="platform"
                                    class="mt-1 block w-full pl-4 pr-4 py-2 border border-primary-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                >
                                    <option value="any">Any</option>
                                    <option value="darwin">macOS</option>
                                    <option value="linux">Linux</option>
                                    <option value="windows">Windows</option>
                                </select>
                            </div>
                            <!-- Snapshot Checkbox -->
                            <div class="flex items-center">
                                <input
                                    id="snapshot"
                                    name="snapshot"
                                    type="checkbox"
                                    x-model="snapshot"
                                    class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                                />
                                <label
                                    for="snapshot"
                                    class="ml-2 block text-sm text-primary-700"
                                >
                                    Snapshot
                                </label>
                            </div>
                        </div>
                    </div>
                    <div
                        class="mt-5 sm:mt-6 sm:grid sm:grid-cols-2 sm:gap-3 sm:grid-flow-row-dense"
                    >
                        <button
                            type="submit"
                            class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:col-start-2 sm:text-sm"
                            :disabled="isSubmitting"
                        >
                            <span x-show="!isSubmitting" x-text="editMode ? 'Update' : 'Create'"></span>
                            <span x-show="isSubmitting" x-text="editMode ? 'Updating...' : 'Creating...'"></span>
                        </button>
                        <button
                            type="button"
                            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:col-start-1 sm:text-sm"
                            @click="showModal = false; resetForm();"
                        >
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{ end }}
