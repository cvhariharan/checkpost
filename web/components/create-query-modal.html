{{ define "create_query_modal" }}
<div x-data="{ 
    showModal: false,
    query: '',
    description: '',
    error: '',
    isSubmitting: false,
    async createQuery() {
        this.isSubmitting = true;
        this.error = '';
        try {
            const response = await fetch('/api/v1/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    query: this.query,
                    description: this.description
                })
            });
            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.error || 'Failed to create query');
            }
            this.showModal = false;
            this.query = '';
            this.description = '';
            window.location.reload();
        } catch (error) {
            console.error('Error creating query:', error);
            this.error = error.message;
        } finally {
            this.isSubmitting = false;
        }
    }
}">
    <!-- Modal Toggle Button -->
    <button 
        @click="showModal = true"
        class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
    >
        <svg class="-ml-1 mr-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
        </svg>
        Create Query
    </button>

    <!-- Modal -->
    <div
        x-show="showModal"
        class="fixed inset-0 z-50 overflow-y-auto"
        x-cloak
    >
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <!-- Background overlay -->
            <div
                x-show="showModal"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                class="fixed inset-0 transition-opacity"
                @click="showModal = false"
            >
                <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
            </div>

            <!-- Modal panel -->
            <div
                x-show="showModal"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6"
            >
                <form @submit.prevent="createQuery">
                    <div>
                        <h3 class="text-lg leading-6 font-medium text-gray-900">Create New Query</h3>
                        {{ template "error_message" . }}
                        <div class="mt-6 space-y-6">
                            <div>
                                <label for="query" class="block text-sm font-medium text-primary-700">SQL Query <span class="text-red-500">*</span></label>
                                <textarea
                                    name="query"
                                    id="query"
                                    x-model="query"
                                    required
                                    rows="5"
                                    placeholder="SELECT * FROM processes;"
                                    class="mt-1 block w-full pl-4 pr-4 py-2 border border-primary-200 rounded-lg text-sm placeholder-primary-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono"
                                ></textarea>
                            </div>
                            <div>
                                <label for="description" class="block text-sm font-medium text-primary-700">Description</label>
                                <textarea
                                    name="description"
                                    id="description"
                                    x-model="description"
                                    rows="3"
                                    placeholder="Enter a description for this query"
                                    class="mt-1 block w-full pl-4 pr-4 py-2 border border-primary-200 rounded-lg text-sm placeholder-primary-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                ></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="mt-5 sm:mt-6 sm:grid sm:grid-cols-2 sm:gap-3 sm:grid-flow-row-dense">
                        <button
                            type="submit"
                            class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:col-start-2 sm:text-sm"
                            :disabled="isSubmitting"
                        >
                            <span x-show="!isSubmitting">Create</span>
                            <span x-show="isSubmitting">Creating...</span>
                        </button>
                        <button
                            type="button"
                            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:col-start-1 sm:text-sm"
                            @click="showModal = false"
                        >
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{ end }}
