[project]
site_name = "Checkpost"
site_description = "Documentation for Checkpost, an open-source osquery manager."
site_url = "https://checkpost.dev/docs/"
repo_url = "https://github.com/cvhariharan/checkpost"
repo_name = "cvhariharan/checkpost"
edit_uri = "edit/master/docs/docs/docs/"
extra_css = ["assets/stylesheets/extra.css"]
nav = [
  { "Home" = "index.md" },
  { "Setup" = "setup.md" },
  { "How it works" = "how-it-works.md" },
  { "Configuration" = "configuration.md" },
  { "Features" = [
    { "Overview" = "features/index.md" },
    { "Inventory" = "features/inventory.md" },
    { "Detections" = "features/detections.md" },
    { "Access" = "features/access.md" },
  ] },
  { "GitOps" = "gitops.md" }
]

[project.theme]
language = "en"
custom_dir = "overrides"
logo = "assets/images/checkpost-mark-light.svg"
favicon = "assets/images/checkpost-mark-light.svg"
features = [
  "content.action.edit",
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.sections",
  "navigation.top",
  "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.toc]
permalink = true
toc_depth = "2-3"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
