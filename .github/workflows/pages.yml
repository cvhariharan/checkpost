name: Deploy site to Pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        working-directory: ./docs/site
        run: make build BASE_URL="${{ steps.pages.outputs.base_url }}"

      - name: Build documentation
        working-directory: ./docs/docs
        run: make build

      - name: Add documentation to site
        run: |
          rm -rf ./docs/site/public/docs
          mkdir -p ./docs/site/public/docs
          cp -a ./docs/docs/site/. ./docs/site/public/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
