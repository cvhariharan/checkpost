name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Install arm64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous tag for changelog
        id: prev_tag
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          if echo "$CURRENT_TAG" | grep -qE '(-beta|-alpha|-rc)'; then
            # Pre-release: diff against the immediately previous tag (any kind).
            PREV=$(git tag --sort=-version:refname | sed -n '2p')
          else
            # Stable release: diff against the previous stable tag.
            PREV=$(git tag --sort=-version:refname | grep -v -e '-beta' -e '-alpha' -e '-rc' | sed -n '2p')
          fi
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.prev_tag.outputs.tag }}
